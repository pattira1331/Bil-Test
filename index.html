<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Igari Receipt Studio 🍧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght=200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: linear-gradient(135deg, #BE2C1F 0%, #F4F4F4 50%, #3F668F 100%);
            color: #3F668F;
            overflow-x: hidden;
            position: relative;
        }
        
        .text-igari-main { color: #3F668F; }
        .border-igari { border-color: #3F668F; }

        /* ================= ANIMATIONS ================= */
        @keyframes igari-flush {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px rgba(190,44,31,0.2)); }
            50% { transform: translateY(-6px) scale(1.03); filter: drop-shadow(0 0 12px rgba(190,44,31,0.5)); }
        }
        @keyframes heart-beat {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(5deg); }
        }
        @keyframes puff-twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.85; transform: scale(1.2); }
        }
        @keyframes star-fall {
            0% { transform: translateY(-20px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(50px) rotate(360deg); opacity: 0; }
        }
        
        .animate-igari { animation: igari-flush 3.5s ease-in-out infinite; }
        .animate-heart { animation: heart-beat 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .animate-puff { animation: puff-twinkle 2.5s ease-in-out infinite; }
        
        /* ================= VERTICAL STRIPE PATTERN BACKGROUND ================= */
        .stripes-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: repeating-linear-gradient(
                90deg,
                #BE2C1F,
                #BE2C1F 40px,
                #F4F4F4 40px,
                #F4F4F4 80px,
                #3F668F 80px,
                #3F668F 120px
            );
            opacity: 0.18;
        }

        /* แก้มส้ม/แดงระเรื่อฟุ้งๆ บนพื้นหลังสไตล์ Igari Makeup */
        .igari-blush-bg {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(190, 44, 31, 0.25) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            pointer-events: none;
        }

        .star-twinkle {
            position: fixed;
            z-index: -1;
            color: #BE2C1F;
            opacity: 0.6;
            pointer-events: none;
        }

        /* เอฟเฟกต์ดาวร่วง */
        .falling-star {
            position: fixed;
            top: -20px;
            color: #BE2C1F;
            pointer-events: none;
            z-index: -1;
            animation: star-fall linear infinite;
        }

        /* ================= RECEIPT STYLING ================= */
        .minimal-play-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 32px;
            border: 4px dashed #F4F4F4;
            box-shadow: 0 20px 40px rgba(63, 102, 143, 0.15);
            padding: 40px 32px;
            background-image: radial-gradient(rgba(190, 44, 31, 0.08) 2px, transparent 2px);
            background-size: 24px 24px;
        }
        .play-mini-btn {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-mini-btn:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(0.95);
        }
        .play-mini-btn:active {
            transform: translateY(1px);
        }
        .input-minimal {
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            transition: all 0.2s ease;
            background-color: #FAFAFA;
            color: #3F668F;
        }
        .input-minimal:focus {
            border-color: #3F668F;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(63, 102, 143, 0.2);
        }
        .icon-mini {
            width: 22px;
            height: 22px;
            display: inline-block;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="stripes-bg"></div>

    <!-- ฟิลเตอร์แก้มแดงระเรื่อรอบๆ หน้าจอ -->

    <div class="star-twinkle animate-puff" style="bottom: 25%; left: 18%; width: 22px; height: 22px; color: #F4F4F4;"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>
    <div class="star-twinkle animate-heart" style="bottom: 10%; right: 15%; width: 22px; height: 22px; color: #3F668F;"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

                <div class="grid grid-cols-2 gap-4 mb-4">

            <!-- สิ้นสุดแผงควบคุมหลัก ปล่อยเพื่อต่อกับ Part 2 -->
            <!-- โซนพรีวิวใบเสร็จ -->
            <div class="relative p-4">
                <div class="minimal-play-receipt min-h-[660px] flex flex-col justify-between" id="receipt-print-area">
                    <!-- ไอคอนตกแต่ง 4 มุมสไตล์ Igari หน้าโมโหแบบน่ารัก / หัวใจ -->
                    <div class="absolute top-4 left-4 text-[#BE2C1F]/40 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
                    <div class="absolute top-4 right-4 text-[#F4F4F4]/60 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>
                    <div class="absolute bottom-4 left-4 text-[#3F668F]/40 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>
                    <div class="absolute bottom-4 right-4 text-[#BE2C1F]/40 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>

                    <div>
                        <div class="flex justify-center mb-4 animate-igari">
                            <div class="w-16 h-16 rounded-full overflow-hidden border-4 border-[#F4F4F4] bg-white p-1 flex items-center justify-center shadow-md">
                                <img id="logo-preview" src="https://via.placeholder.com/150/fff/BE2C1F?text=%E2%9D%A4%EF%B8%8F" alt="Logo" class="w-full h-full object-cover rounded-full">
                            </div>
                        </div>

                        <div class="text-center mb-6">
                            <h2 id="shop-name-view" class="text-xl font-medium text-igari-main tracking-wide">pattira だ</h2>
                            <p id="shop-sub-view" class="text-[9px] text-slate-400 font-medium tracking-widest uppercase mt-1">THANK YOU FOR YOUR ORDER</p>
                        </div>

                        <div class="grid grid-cols-2 gap-y-2 text-xs font-light text-slate-400 mb-4 px-1">
                            <div><span>Customer:</span> <span id="customer-name-view" class="text-igari-main font-normal ml-1"></span></div>
                            <div class="text-right"><span>Order ID:</span> <span id="order-id-view" class="text-igari-main font-normal ml-1"></span></div>
                            <div><span>Channel:</span> <span id="channel-view" class="text-slate-500 font-normal ml-1"></span></div>
                            <div class="text-right"><span>Date:</span> <span id="date-view" class="text-slate-500 ml-1"></span></div>
                            <div></div>
                            <div class="text-right"><span>Time:</span> <span id="time-view" class="text-slate-500 ml-1"></span></div>
                        </div>

                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>

                        <div id="receipt-items-view" class="space-y-4 my-4 text-xs font-light text-igari-main"></div>
                    </div>

                    <div>
                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>
                        
                        <div class="bg-[#BE2C1F]/5 rounded-2xl p-3 flex justify-between items-center mb-4 px-4 border border-[#BE2C1F]/20">
                            <span class="text-xs font-medium text-[#BE2C1F] tracking-wider uppercase flex items-center gap-1.5">
                                TOTAL 
                                <span class="icon-mini text-[#BE2C1F] animate-heart"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
                            </span>
                            <span class="text-md font-medium text-igari-main">฿<span id="total-amount-view">0.00</span></span>
                        </div>

                        <div id="footer-note-view" class="text-center text-[10px] text-[#BE2C1F] font-light my-3 px-3 bg-[#F4F4F4]/40 py-2 rounded-xl border border-[#F4F4F4] animate-igari"></div>

                        <div class="mt-2 flex justify-center">
                            <img id="footer-preview" src="https://via.placeholder.com/340x60/3F668F/ffffff?text=%E2%9D%A4%EF%B8%8F+FLUSH+BLUSH+PLAYROOM+%E2%9D%A4%EF%B8%8F" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-slate-100">
                        </div>

                        <div id="bottom-text-view" class="text-center text-[9px] text-slate-400 font-light mt-4 px-2 tracking-wide"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        // ฟังก์ชันสร้างดาวตกแบบ Real-time ร่วงหล่นต่อเนื่อง
        function createFallingStars() {
            const starCount = 35; 
            for (let i = 0; i < starCount; i++) {
                setTimeout(() => {
                    const star = document.createElement('div');
                    star.className = 'falling-star';
                    // สุ่มรูปดาวขนาดต่างๆ กัน
                    star.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: ${Math.random() * 10 + 6}px; height: ${Math.random() * 10 + 6}px;"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg>`;
                    
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.animationDuration = Math.random() * 4 + 4 + 's'; 
                    star.style.animationDelay = Math.random() * 5 + 's';
                    star.style.opacity = Math.random() * 0.5 + 0.3;
                    
                    // สุ่มสีของดาวตามพาเลทที่กำหนด
                    const colors = ['#BE2C1F', '#FFFFFF', '#3F668F'];
                    star.style.color = colors[Math.floor(Math.random() * colors.length)];

                    document.body.appendChild(star);

                    // วนลูปสร้างใหม่เมื่อดาวตกร่วงพ้นหน้าจอไปแล้ว
                    star.addEventListener('animationend', () => {
                        star.remove();
                        createSingleStar();
                    });
                }, Math.random() * 6000);
            }
        }

        function createSingleStar() {
            const star = document.createElement('div');
            star.className = 'falling-star';
            star.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" style="width: ${Math.random() * 10 + 6}px; height: ${Math.random() * 10 + 6}px;"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg>`;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = Math.random() * 4 + 4 + 's';
            star.style.opacity = Math.random() * 0.5 + 0.3;
            
            const colors = ['#BE2C1F', '#FFFFFF', '#3F668F'];
            star.style.color = colors[Math.floor(Math.random() * colors.length)];

            document.body.appendChild(star);
            star.addEventListener('animationend', () => {
                star.remove();
                createSingleStar();
            });
        }

        // เรียกใช้งานระบบดาวตกทันทีที่เปิดหน้าเว็บ
        createFallingStars();

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'minnek1256' && pass === 'yinkza1256') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง 😭');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs font-light focus:outline-none focus:border-slate-400 text-igari-main">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-center focus:outline-none focus:border-slate-400 text-igari-main">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-right focus:outline-none focus:border-slate-400 text-igari-main">
                        <button onclick="removeItemRow(${index})" class="text-slate-400 font-light px-1 text-xs hover:text-rose-500">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start tracking-wide">
                        <div>
                            <div class="font-normal text-igari-main">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-slate-400 font-light mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-normal text-slate-500 text-right pt-0.5">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#ffffff',
                borderRadius: '32px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `igari-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('Error generating canvas:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง');
            });
        }
    </script>
</body>
</html>
