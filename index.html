<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Igari Receipt Studio 🍧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- อัปเกรดฟอนต์ใหม่ให้มีความน่ารัก ละมุน และดูเป็นสไตล์พาสเทลคาเฟ่มากขึ้นด้วย Mitr, Itim และ Dosis -->
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mitr:wght@300;400;500&family=Dosis:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Mitr', 'Itim', sans-serif;
            background-color: #F4F4F4;
            color: #252C36;
            overflow-x: hidden;
            position: relative;
        }
        
        .text-igari-main { color: #252C36; }
        .border-igari { border-color: #252C36; }

        /* ================= ANIMATIONS ================= */
        @keyframes igari-flush {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px rgba(37,44,54,0.08)); }
            50% { transform: translateY(-6px) scale(1.02); filter: drop-shadow(0 0 14px rgba(37,44,54,0.15)); }
        }
        @keyframes heart-beat {
            0%, 100% { transform: scale(1) rotate(-4deg); }
            50% { transform: scale(1.12) rotate(4deg); }
        }
        @keyframes puff-twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes float-cute {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-10px) rotate(8deg) scale(1.08); }
        }
        @keyframes fall-effect {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
        
        .animate-igari { animation: igari-flush 3.8s ease-in-out infinite; }
        .animate-heart { animation: heart-beat 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .animate-puff { animation: puff-twinkle 2.2s ease-in-out infinite; }
        .animate-bg-cute { animation: float-cute 4.5s ease-in-out infinite; }
        
        /* ================= GRID PATTERN BACKGROUND ================= */
        .stripes-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #F5F5F3;
            background-image: 
                linear-gradient(rgba(37, 44, 54, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 44, 54, 0.025) 1px, transparent 1px);
            background-size: 26px 26px;
        }

        .igari-blush-bg {
            position: fixed;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(210, 0, 0, 0.08) 0%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
            pointer-events: none;
        }

        .bg-element-cute {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            object-fit: contain;
            opacity: 0.85;
        }

        .falling-item {
            position: fixed;
            top: -5vh;
            z-index: 50;
            pointer-events: none;
            animation: fall-effect linear infinite;
        }

        /* ================= RECEIPT STYLING ================= */
        .minimal-play-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 36px;
            border: 4px dashed #ABBB50;
            box-shadow: 0 25px 50px rgba(37, 44, 54, 0.08);
            padding: 44px 34px;
            background-image: radial-gradient(rgba(37, 44, 54, 0.03) 2px, transparent 2px);
            background-size: 24px 24px;
        }
        .play-mini-btn {
            font-family: 'Itim', 'Mitr', sans-serif;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-mini-btn:hover {
            transform: translateY(-2.5px) scale(1.015);
            box-shadow: 0 10px 20px rgba(37, 44, 54, 0.15);
        }
        .play-mini-btn:active {
            transform: translateY(1px);
        }
        .input-minimal {
            border: 2px solid #E2E8F0;
            border-radius: 18px;
            transition: all 0.2s ease;
            background-color: #FAFAFA;
            color: #252C36;
            font-family: 'Mitr', sans-serif;
            font-weight: 300;
        }
        .input-minimal:focus {
            border-color: #252C36;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(37, 44, 54, 0.12);
        }
        .icon-mini {
            width: 22px;
            height: 22px;
            display: inline-block;
            flex-shrink: 0;
        }
    </style>
</head>

                    <div class="absolute top-4 left-4 text-[#252C36]/20 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
                    <div class="absolute top-4 right-4 text-[#ABBB50]/60 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>
                    <div class="absolute bottom-4 left-4 text-[#252C36]/20 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.2h7.6l-6.2 4.5 2.4 7.3-6.2-4.5-6.2 4.5 2.4-7.3-6.2-4.5h7.6z"/></svg></div>
                    <div class="absolute bottom-4 right-4 text-[#D00000]/40 w-4 h-4 select-none"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>

                    <div>
                        <div class="flex justify-center mb-4 animate-igari">
                            <div class="w-16 h-16 rounded-full overflow-hidden border-4 border-[#ABBB50] bg-white p-1 flex items-center justify-center shadow-md">
                                <img id="logo-preview" src="https://via.placeholder.com/150/fff/D00000?text=%E2%9D%A4%EF%B8%8F" alt="Logo" class="w-full h-full object-cover rounded-full">
                            </div>
                        </div>

                        <div class="text-center mb-6">
                            <h2 id="shop-name-view" class="text-xl font-medium text-igari-main tracking-wide font-['Itim'] text-2xl">pattira だ</h2>
                            <p id="shop-sub-view" class="text-[10px] text-slate-400 font-semibold tracking-widest uppercase mt-1.5 font-['Dosis']">THANK YOU FOR YOUR ORDER</p>
                        </div>

                        <div class="grid grid-cols-2 gap-y-2.5 text-xs font-light text-slate-400 mb-4 px-1 font-['Mitr']">
                            <div><span>Customer:</span> <span id="customer-name-view" class="text-igari-main font-medium ml-1"></span></div>
                            <div class="text-right"><span>Order ID:</span> <span id="order-id-view" class="text-igari-main font-medium ml-1"></span></div>
                            <div><span>Channel:</span> <span id="channel-view" class="text-slate-500 font-medium ml-1"></span></div>
                            <div class="text-right"><span>Date:</span> <span id="date-view" class="text-slate-500 ml-1"></span></div>
                            <div></div>
                            <div class="text-right"><span>Time:</span> <span id="time-view" class="text-slate-500 ml-1"></span></div>
                        </div>

                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>

                        <div id="receipt-items-view" class="space-y-4 my-4 text-xs font-light text-igari-main font-['Mitr']"></div>
                    </div>

                    <div>
                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>
                        
                        <div class="bg-[#252C36]/5 rounded-2xl p-3 flex justify-between items-center mb-4 px-4 border border-[#252C36]/10">
                            <span class="text-xs font-medium text-[#252C36] tracking-wider uppercase flex items-center gap-1.5 font-['Dosis'] font-bold">
                                TOTAL 
                                <span class="icon-mini text-[#D00000] animate-heart"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></span>
                            </span>
                            <span class="text-md font-semibold text-igari-main font-['Itim'] text-2xl">฿<span id="total-amount-view">0.00</span></span>
                        </div>

                        <div id="footer-note-view" class="text-center text-xs text-[#252C36] font-normal my-3 px-3 bg-[#ABBB50]/10 py-2.5 rounded-xl border border-[#ABBB50]/20 animate-igari font-['Mitr']"></div>

                        <div class="mt-2 flex justify-center">
                            <img id="footer-preview" src="https://via.placeholder.com/340x60/252C36/ffffff?text=%E2%9D%A4%EF%B8%8F+FLUSH+BLUSH+PLAYROOM+%E2%9D%A4%EF%B8%8F" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-slate-100">
                        </div>

                        <div id="bottom-text-view" class="text-center text-[10px] text-slate-400 font-light mt-4 px-2 tracking-wide font-['Mitr']"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'minnek1256' && pass === 'yinkza1256') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง 😭');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
            createFallingEffects();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs font-light focus:outline-none focus:border-slate-400 text-igari-main font-['Mitr']">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-center focus:outline-none focus:border-slate-400 text-igari-main font-['Mitr']">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-right focus:outline-none focus:border-slate-400 text-igari-main font-['Mitr']">
                        <button onclick="removeItemRow(${index})" class="text-slate-400 font-light px-1 text-xs hover:text-rose-500">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start tracking-wide">
                        <div>
                            <div class="font-normal text-igari-main text-[13px]">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-slate-400 font-light mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-normal text-slate-500 text-right pt-0.5 text-[13px]">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#ffffff',
                borderRadius: '36px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `igari-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('Error generating canvas:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง');
            });
        }

        /* ================= อัปเดตเอฟเฟกต์ร่วงหล่นเป็นรูปภาพตามโจทย์กำหนด ================= */
        function createFallingEffects() {
            if (document.querySelector('.falling-item')) return;

            const IMAGES_POOL = [
                'https://i.postimg.cc/vmft9YC4/star.png',
                'https://i.postimg.cc/yY5cxx7H/mi-m-ch-x-682-20260708223709.png'
            ];

            setInterval(() => {
                const element = document.createElement('img');
                element.className = 'falling-item';
                
                element.src = IMAGES_POOL[Math.floor(Math.random() * IMAGES_POOL.length)];

                // ปรับขนาดรูปชิ้นเล็กๆ พอประมาณ (สุ่มระหว่าง 12px ถึง 20px)
                const size = Math.floor(Math.random() * 8) + 12; 
                element.style.width = `${size}px`;
                element.style.height = `${size}px`;

                element.style.left = `${Math.random() * 100}vw`;

                const duration = Math.random() * 4 + 4;
                element.style.animationDuration = `${duration}s`;

                document.body.appendChild(element);

                setTimeout(() => {
                    element.remove();
                }, duration * 1000);

            }, 300);
        }
    </script>
</body>
</html>
