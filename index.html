<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 Minimal Playground Receipt Studio 🧃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- เปลี่ยนเป็นฟอนต์ Anuphan ที่มีความน่ารัก ละมุน ตัวบาง และอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: linear-gradient(135deg, #E0F2FE 0%, #E6F4EA 50%, #FFF7ED 100%);
            background-attachment: fixed;
        }
        
        /* ใบเสร็จสไตล์มินิมอลสนามเด็กเล่น ลายตารางจางๆ สะอาดตา */
        .minimal-play-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 24px;
            border: 3px solid #BAE6FD;
            box-shadow: 0 10px 30px rgba(186, 230, 253, 0.3);
            padding: 36px 28px;
            background-image: radial-gradient(#FFEDD5 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }

        /* ปุ่มกดดีไซน์นุ่มนวล สไตล์มินิมอลแต่ยังดูสนุกสนาน */
        .play-mini-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-mini-btn:hover {
            transform: translateY(-1px);
            filter: brightness(0.98);
        }
        .play-mini-btn:active {
            transform: translateY(1px);
        }

        .input-minimal {
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            transition: all 0.2s ease;
            background-color: #FAFAFA;
        }
        .input-minimal:focus {
            border-color: #7DD3FC;
            background-color: #ffffff;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- เซกชัน Login มินิมอลคลีนๆ -->
    <div id="login-section" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl w-96 border-2 border-[#7DD3FC] shadow-sm">
            <h2 class="text-lg font-medium mb-6 text-center text-[#0369A1] tracking-wider">🧩 SIGN IN PLAYGROUND</h2>
            <div class="mb-4">
                <label class="block text-slate-500 text-xs font-medium mb-1.5 uppercase tracking-wider">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 input-minimal text-sm font-light" value="admin">
            </div>
            <div class="mb-6">
                <label class="block text-slate-500 text-xs font-medium mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 input-minimal text-sm font-light" value="1234">
            </div>
            <button onclick="handleLogin()" class="w-full play-mini-btn bg-[#7DD3FC] text-white font-medium py-2.5 rounded-xl text-sm shadow-sm tracking-wide">ENTER STUDIO 🎪</button>
            <p class="text-[10px] text-slate-400 mt-4 text-center tracking-wide">* Admin / 1234</p>
        </div>
    </div>

    <!-- เซกชันหลัก -->
    <div id="main-section" class="container mx-auto max-w-5xl hidden">
        <div class="flex justify-between items-center mb-8 bg-white/80 backdrop-blur-sm p-4 rounded-2xl border-2 border-slate-100 shadow-sm">
            <h1 class="text-sm font-medium text-slate-700 tracking-wide flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-[#7DD3FC]"></span> Playground Studio (Minimal Light)
            </h1>
            <button onclick="handleLogout()" class="bg-slate-100 text-slate-500 border border-slate-200 px-3 py-1 rounded-xl hover:bg-slate-200 transition text-xs font-medium">Log Out</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <!-- ฝั่งซ้าย: ฟอร์มกรอกข้อมูล -->
            <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                <h3 class="text-xs font-medium mb-4 text-slate-700 uppercase tracking-wider border-b-2 border-slate-100 pb-2 flex items-center gap-1.5">🧃 Receipt Editor</h3>
                
                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-500">อัปโหลดโลโก้ร้าน</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewImage(this, 'logo-preview')" class="mt-1 block w-full text-xs text-slate-400 file:mr-4 file:py-1 file:px-3 file:rounded-xl file:border file:border-slate-200 file:text-xs file:font-medium file:bg-white file:text-slate-600 hover:file:bg-slate-50">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500">ชื่อร้าน/หัวข้อหลัก</label>
                        <input type="text" id="shop-name-input" value="Kosame Store" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">สโลแกน/ข้อความย่อย</label>
                        <input type="text" id="shop-sub-input" value="THANK YOU FOR YOUR ORDER" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500">ชื่อลูกค้า</label>
                        <input type="text" id="customer-name-input" value="คุณพิมพลอย ใจดี" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">ช่องทางการซื้อขาย</label>
                        <input type="text" id="channel-input" value="Instagram" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Order ID</label>
                        <input type="text" id="order-id-input" value="#KS-889" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Time (เวลา)</label>
                        <input type="text" id="time-input" value="14:25" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-500">Date (วันที่)</label>
                    <input type="text" id="date-input" value="07/07/2026" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-700 mb-2">รายการสินค้าในใบเสร็จ</label>
                    <div id="items-container" class="space-y-2"></div>
                    <button onclick="addItemRow()" class="mt-2 text-xs bg-slate-50 text-slate-600 border border-slate-200 font-medium px-3 py-1.5 rounded-xl hover:bg-slate-100 transition">+ เพิ่มรายการสินค้า</button>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-500">ข้อความขอบคุณ/หมายเหตุ</label>
                    <input type="text" id="footer-note-input" value="✨ ได้รับสินค้าแล้ว อย่าลืมรีวิวแท็กมาอวดกันน้า ✨" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-500">รูปภาพตกแต่งด้านล่างสุด (Footer Banner)</label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-1 block w-full text-xs text-slate-400 file:mr-4 file:py-1 file:px-3 file:rounded-xl file:border file:border-slate-200 file:text-xs file:font-medium file:bg-white file:text-slate-600 hover:file:bg-slate-50">
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-medium text-slate-500">ข้อความหมายเหตุด้านล่างสุด</label>
                    <input type="text" id="bottom-text-input" value="ขอบคุณที่อุดหนุนร้านเล็กๆ ของเรานะคะ ช่องทางติดต่อ Line: @kosamestore" class="mt-1 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <button onclick="downloadReceiptImage()" class="w-full play-mini-btn bg-[#FDBA74] text-white font-medium py-3 rounded-xl transition mt-2 shadow-sm text-sm tracking-wider">
                    🧸 DOWNLOAD MINIMAL RECEIPT
                </button>
            </div>

            <!-- ฝั่งขวา: พรีวิวใบเสร็จสไตล์มินิมอลเพลย์กราวด์ (ปรับฟอนต์บาง นุ่มนวลขึ้น) -->
            <div class="minimal-play-receipt min-h-[660px] flex flex-col justify-between" id="receipt-print-area">
                <div>
                    <!-- โลโก้แบรนด์ทรงสี่เหลี่ยมโค้งมนมินิมอล -->
                    <div class="flex justify-center mb-4">
                        <div class="w-14 h-14 rounded-2xl overflow-hidden border-2 border-[#BAE6FD] bg-white p-1 flex items-center justify-center">
                            <img id="logo-preview" src="https://via.placeholder.com/150/fff/0369A1?text=%F0%9F%A7%A9" alt="Logo" class="w-full h-full object-cover rounded-xl">
                        </div>
                    </div>

                    <div class="text-center mb-6">
                        <!-- ปรับเป็น font-medium เพื่อความน่ารักไม่หนาเทอะทะ -->
                        <h2 id="shop-name-view" class="text-xl font-medium text-slate-800 tracking-wide">Kosame Store</h2>
                        <p id="shop-sub-view" class="text-[9px] text-slate-400 font-medium tracking-widest uppercase mt-1">THANK YOU FOR YOUR ORDER</p>
                    </div>

                    <!-- ข้อมูลลูกค้า ตัวบางคลีนๆ อ่านง่าย -->
                    <div class="grid grid-cols-2 gap-y-2 text-xs font-light text-slate-400 mb-4 px-1">
                        <div><span>Customer:</span> <span id="customer-name-view" class="text-slate-700 font-normal ml-1"></span></div>
                        <div class="text-right"><span>Order ID:</span> <span id="order-id-view" class="text-slate-700 font-normal ml-1"></span></div>
                        <div><span>Channel:</span> <span id="channel-view" class="text-slate-600 font-normal ml-1"></span></div>
                        <div class="text-right"><span>Date:</span> <span id="date-view" class="text-slate-500 ml-1"></span></div>
                        <div></div>
                        <div class="text-right"><span>Time:</span> <span id="time-view" class="text-slate-500 ml-1"></span></div>
                    </div>

                    <!-- เส้นแบ่งแบบเรียบง่ายสไตล์มินิมอล -->
                    <div class="border-b-2 border-dashed border-slate-100 my-4"></div>

                    <!-- รายการสินค้า ใช้ font-normal/light ตัวบางสะอาดตา -->
                    <div id="receipt-items-view" class="space-y-4 my-4 text-xs font-light text-slate-600"></div>
                </div>

                <div>
                    <div class="border-b-2 border-dashed border-slate-100 my-4"></div>
                    
                    <!-- ยอดรวมบล็อกสีส้มครีมบางๆ ปรับฟอนต์ให้ซอฟต์ลง -->
                    <div class="bg-[#FFF7ED] rounded-xl p-3 flex justify-between items-center mb-4 px-4 border border-[#FFEDD5]">
                        <span class="text-xs font-medium text-orange-400 tracking-wider uppercase">TOTAL</span>
                        <span class="text-md font-medium text-slate-800">฿<span id="total-amount-view">0.00</span></span>
                    </div>

                    <!-- ข้อความโน้ตท้ายบิล ตัวบางน่ารัก -->
                    <div id="footer-note-view" class="text-center text-[10px] text-emerald-600 font-light my-3 px-3 bg-[#E6F4EA]/60 py-2 rounded-xl border border-[#D1FAE5]"></div>

                    <!-- แบนเนอร์คลีนๆ ด้านล่างสุด -->
                    <div class="mt-2 flex justify-center">
                        <img id="footer-preview" src="https://via.placeholder.com/340x60/F0F9FF/0369A1?text=%F0%9F%A2%9D+HAVE+A+GOOD+PLAYTIME+%F0%9F%A2%9D" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-slate-100">
                    </div>

                    <!-- ฟุตเตอร์เครดิตจางๆ -->
                    <div id="bottom-text-view" class="text-center text-[9px] text-slate-400 font-light mt-4 px-2 tracking-wide"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง 😭');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs font-light focus:outline-none focus:border-slate-400">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-center focus:outline-none focus:border-slate-400">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-right focus:outline-none focus:border-slate-400">
                        <button onclick="removeItemRow(${index})" class="text-slate-400 font-light px-1 text-xs hover:text-rose-500">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start tracking-wide">
                        <div>
                            <div class="font-normal text-slate-700">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-slate-400 font-light mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-normal text-slate-600 text-right pt-0.5">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#ffffff',
                borderRadius: '24px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `minimal-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('Error generating canvas:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง');
            });
        }
    </script>
</body>
</html>
