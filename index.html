<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการและสร้างใบเสร็จ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div id="login-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">เข้าสู่ระบบจัดการใบเสร็จ</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" value="admin">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" value="1234">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600 transition">เข้าสู่ระบบ</button>
            <p class="text-xs text-gray-500 mt-4 text-center">* ค่าเริ่มต้น: admin / 1234</p>
        </div>
    </div>

    <div id="main-section" class="container mx-auto p-4 max-w-5xl hidden">
        <div class="flex justify-between items-center mb-6 no-print">
            <h1 class="text-2xl font-bold text-gray-800">ระบบสร้างใบเสร็จ</h1>
            <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">ออกจากระบบ</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow no-print">
                <h3 class="text-lg font-bold mb-4 border-b pb-2">แก้ไขข้อมูลใบเสร็จ</h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">อัปโหลดโลโก้ร้าน</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewImage(this, 'logo-preview')" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">รายละเอียดใต้ชื่อร้าน</label>
                    <textarea id="shop-details-input" rows="2" class="mt-1 block w-full border rounded p-2" oninput="updateReceipt()">123 ถนนสุขุมวิท แขวงคลองเตย เขตคลองเตย กรุงเทพฯ 10110</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">เลขที่ออเดอร์</label>
                        <input type="text" id="order-id-input" value="ORD-2026-001" class="mt-1 block w-full border rounded p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">วันที่</label>
                        <input type="date" id="date-input" class="mt-1 block w-full border rounded p-2" onchange="updateReceipt()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-2">รายการสินค้า</label>
                    <div id="items-container" class="space-y-2">
                        </div>
                    <button onclick="addItemRow()" class="mt-2 text-sm bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">+ เพิ่มสินค้า</button>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">รูปภาพเพิ่มเติมด้านล่าง (ขนาดใดก็ได้)</label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button onclick="window.print()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition mt-4">🖨️ พิมพ์ใบเสร็จ / บันทึกเป็น PDF</button>
            </div>

            <div class="bg-white p-8 rounded-lg shadow min-h-[700px]" id="receipt-print-area">
                <div class="text-center mb-6">
                    <div class="flex justify-center mb-2">
                        <img id="logo-preview" src="https://via.placeholder.com/100" alt="Logo" class="max-h-24 object-contain">
                    </div>
                    <h2 class="text-xl font-bold text-gray-800">ใบเสร็จรับเงิน / Receipt</h2>
                    <p id="shop-details-view" class="text-sm text-gray-600 whitespace-pre-line text-center mt-1"></p>
                </div>

                <div class="flex justify-between border-b pb-4 mb-4 text-sm">
                    <div>
                        <strong>เลขที่ออเดอร์:</strong> <span id="order-id-view"></span>
                    </div>
                    <div>
                        <strong>วันที่:</strong> <span id="date-view"></span>
                    </div>
                </div>

                <table class="w-full text-left text-sm mb-6">
                    <thead>
                        <tr class="border-b-2 border-gray-300">
                            <th class="py-2">สินค้า</th>
                            <th class="py-2 text-center" width="15%">จำนวน</th>
                            <th class="py-2 text-right" width="20%">ราคา/หน่วย</th>
                            <th class="py-2 text-right" width="25%">รวมเงิน</th>
                        </tr>
                    </thead>
                    <tbody id="receipt-items-view">
                        </tbody>
                </table>

                <div class="flex justify-end border-t pt-4 mb-6">
                    <div class="w-1/2 text-right space-y-1">
                        <div class="text-base font-bold text-gray-900">
                            ยอดรวมทั้งสิ้น: <span id="total-amount-view" class="ml-2">0.00</span> บาท
                        </div>
                    </div>
                </div>

                <div class="mt-8 flex justify-center">
                    <img id="footer-preview" src="" alt="" class="max-w-full h-auto hidden">
                </div>
            </div>
        </div>
    </div>

    <script>
        // เซ็ตวันที่ปัจจุบันเป็น Default
        document.getElementById('date-input').value = new Date().toISOString().split('T')[0];

        // ระบบ Login แบบง่าย
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง!');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        // จัดการข้อมูลสินค้า
        let items = [
            { name: 'สินค้าตัวอย่างชิ้นที่ 1', qty: 2, price: 150 },
            { name: 'สินค้าตัวอย่างชิ้นที่ 2', qty: 1, price: 450 }
        ];

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="ชื่อสินค้า" class="flex-1 border rounded p-1 text-sm">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-16 border rounded p-1 text-sm text-center">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-20 border rounded p-1 text-sm text-right">
                        <button onclick="removeItemRow(${index})" class="text-red-500 font-bold px-2">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        // อัปเดตข้อมูลพรีวิวใบเสร็จและคำนวณเงินอัตโนมัติ
        function updateReceipt() {
            document.getElementById('shop-details-view').innerText = document.getElementById('shop-details-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;

            const tbody = document.getElementById('receipt-items-view');
            tbody.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                tbody.innerHTML += `
                    <tr class="border-b">
                        <td class="py-2">${item.name || 'ไม่ได้ระบุชื่อ'}</td>
                        <td class="py-2 text-center">${item.qty}</td>
                        <td class="py-2 text-right">${item.price.toFixed(2)}</td>
                        <td class="py-2 text-right">${subtotal.toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toLocaleString('th-TH', { minimumFractionDigits: 2 });
        }

        // ฟังก์ชันจัดการรูปภาพ (Logo และ รูปด้านล่าง)
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
