<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการและสร้างใบเสร็จสุดน่ารัก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chani&family=Itim&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Itim', 'Mitr', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 50%, #fef9c3 100%);
        }
        
        /* สร้างเอฟเฟกต์ขอบหยักกระดาษใบเสร็จแบบในรูปภาพ */
        .cute-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 2px dashed #bae6fd;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="login-section" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl w-96 border border-sky-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-sky-400">🧁 เข้าสู่ระบบใบเสร็จ</h2>
            <div class="mb-4">
                <label class="block text-sky-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-300" value="admin">
            </div>
            <div class="mb-6">
                <label class="block text-sky-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-sky-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-sky-300" value="1234">
            </div>
            <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-sky-400 to-emerald-400 text-white font-bold py-2.5 px-4 rounded-2xl hover:opacity-90 transition shadow-md shadow-sky-200">เข้าสู่ระบบ</button>
            <p class="text-xs text-gray-400 mt-4 text-center">* Admin / 1234</p>
        </div>
    </div>

    <div id="main-section" class="container mx-auto max-w-5xl hidden">
        <div class="flex justify-between items-center mb-6 bg-white/60 backdrop-blur-sm p-4 rounded-2xl">
            <h1 class="text-2xl font-bold text-sky-500 flex items-center gap-2">🛒 ระบบสร้างใบเสร็จหวานแหวว</h1>
            <button onclick="handleLogout()" class="bg-rose-400 text-white px-4 py-1.5 rounded-xl hover:bg-rose-500 transition text-sm">ออกจากระบบ</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <div class="bg-white/90 p-6 rounded-3xl shadow-sm border border-sky-100">
                <h3 class="text-lg font-bold mb-4 text-sky-500 border-b border-sky-100 pb-2">✏️ แก้ไขข้อมูลใบเสร็จ</h3>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">อัปโหลดโลโก้ร้าน (วงกลม/เหลี่ยม)</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewImage(this, 'logo-preview')" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-600 hover:file:bg-sky-100">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">ชื่อร้าน/หัวข้อหลัก</label>
                        <input type="text" id="shop-name-input" value="Kosame" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">สโลแกน/ข้อความย่อย</label>
                        <input type="text" id="shop-sub-input" value="CMS & WEBAPP" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">ชื่อลูกค้า</label>
                        <input type="text" id="customer-name-input" value="คุณสมศักดิ์ รักดี" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">ช่องทางการซื้อขาย</label>
                        <input type="text" id="channel-input" value="Shopee" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Order ID</label>
                        <input type="text" id="order-id-input" value="#001" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Time (เวลา)</label>
                        <input type="text" id="time-input" value="10:30" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600">Date (วันที่)</label>
                    <input type="text" id="date-input" value="1/6/2569" class="mt-1 block w-full border border-gray-200 rounded-xl p-2 focus:ring-2 focus:ring-sky-200 focus:outline-none" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-600 mb-2">รายการสินค้าในใบเสร็จ</label>
                    <div id="items-container" class="space-y-2"></div>
                    <button onclick="addItemRow()" class="mt-2.5 text-xs bg-emerald-400 text-white px-3 py-1.5 rounded-xl hover:bg-emerald-500 transition">+ เพิ่มรายการสินค้า</button>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-600">รูปภาพตกแต่ง/แถบคาดด้านล่าง</label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-sky-50 file:text-sky-600 hover:file:bg-sky-100">
                </div>

                <button onclick="downloadReceiptImage()" class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 text-white font-bold py-3 rounded-2xl hover:opacity-95 transition mt-2 shadow-md shadow-emerald-100 flex items-center justify-center gap-2">
                    💾 บันทึกใบเสร็จดาวน์โหลดลงมือถือ
                </button>
            </div>

            <div class="cute-receipt p-6 md:p-8 min-h-[650px] flex flex-col justify-between" id="receipt-print-area">
                <div>
                    <div class="text-center mb-6">
                        <div class="flex justify-center mb-2">
                            <div class="w-20 h-20 rounded-2xl overflow-hidden border-2 border-sky-100 shadow-sm bg-sky-50 flex items-center justify-center">
                                <img id="logo-preview" src="https://via.placeholder.com/150/e0f2fe/0284c7?text=Kosame" alt="Logo" class="w-full h-full object-cover">
                            </div>
                        </div>
                        <h2 id="shop-name-view" class="text-xl font-bold text-amber-900/80 tracking-wide">Kosame</h2>
                        <p id="shop-sub-view" class="text-xs text-sky-400 font-medium uppercase tracking-wider">CMS & WEBAPP</p>
                    </div>

                    <div class="grid grid-cols-2 gap-y-1 text-xs text-amber-950/70 mb-4 px-1 font-sans">
                        <div><strong>Customer:</strong> <span id="customer-name-view" class="text-slate-700"></span></div>
                        <div class="text-right"><strong>Order ID:</strong> <span id="order-id-view" class="font-mono"></span></div>
                        <div><strong>Channel:</strong> <span id="channel-view" class="text-slate-700"></span></div>
                        <div class="text-right"><strong>Date:</strong> <span id="date-view"></span></div>
                        <div></div>
                        <div class="text-right"><strong>Time:</strong> <span id="time-view"></span></div>
                    </div>

                    <div class="border-b-2 border-dashed border-sky-100 my-3"></div>

                    <div id="receipt-items-view" class="space-y-4 my-4 text-sm text-slate-700"></div>
                </div>

                <div>
                    <div class="border-b-2 border-dashed border-sky-100 my-4"></div>
                    
                    <div class="bg-sky-50/70 rounded-2xl p-3 flex justify-between items-center mb-4 px-4 border border-sky-100/50">
                        <span class="text-xs font-bold text-sky-600 tracking-wider uppercase">Total</span>
                        <span class="text-lg font-bold text-sky-600"><span id="total-amount-view">0.00</span></span>
                    </div>

                    <div class="mt-4 flex justify-center">
                        <img id="footer-preview" src="https://via.placeholder.com/300x80/fef9c3/b45309?text=thank+you" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain">
                    </div>
                </div>
            </div>

        </div>
    </div>
    <script>
        // ข้อมูลตัวอย่างเริ่มต้นตามหน้าจอในภาพคู่มือ
        let items = [
            { name: 'ชาไทย', qty: 2, price: 45.00 },
            { name: 'มัทฉะลาเต้', qty: 1, price: 65.00 }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้องน้า 😭');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-gray-200 rounded-lg p-1 text-xs focus:outline-none">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="กี่ชิ้น" class="w-12 border border-gray-200 rounded-lg p-1 text-xs text-center focus:outline-none">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-gray-200 rounded-lg p-1 text-xs text-right focus:outline-none">
                        <button onclick="removeItemRow(${index})" class="text-rose-400 font-bold px-1 text-sm hover:text-rose-600">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        // ประมวลผลและอัปเดตหน้าตาใบเสร็จพาสเทล
        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-medium text-slate-800">${item.name || 'ยังไม่ระบุชื่อสินค้า'}</div>
                            <div class="text-xs text-slate-400 mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-mono text-slate-600 text-right pt-1">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        // จัดการอัปโหลดและพรีวิวไฟล์ภาพ (ทั้งโลโก้ และสติกเกอร์ด้านล่าง)
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ฟังก์ชันหัวใจหลัก: แปลง HTML ใบเสร็จเฉพาะส่วนพรีวิวให้เป็นรูปภาพและดาวน์โหลดอัตโนมัติ
        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 2, 
                backgroundColor: '#ffffff'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('เกิดข้อผิดพลาดในการบันทึกรูปภาพ:', error);
                alert('ไม่สามารถบันทึกเป็นรูปภาพได้ กรุณาลองใหม่อีกครั้งนะครับ');
            });
        }
    </script>
</body>
</html>
