<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Coquette Receipt Generator 🎀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            /* ใช้โทนสีที่คุณกำหนด: E9CFF4, FED2EB, C3E0F6 */
            background: linear-gradient(135deg, #E9CFF4 0%, #FED2EB 50%, #C3E0F6 100%);
            background-attachment: fixed;
        }
        
        /* ดีไซน์กรอบใบเสร็จสไตล์ Coquette โค้งมน ล้อมรอบด้วยเงาฟุ้งสีชมพู และขอบลูกไม้ */
        .cute-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 24px;
            box-shadow: 0 15px 35px -5px rgba(254, 210, 235, 0.8), 0 0 0 4px #FED2EB, 0 0 0 5px #ffffff, 0 0 0 8px #E9CFF4;
            padding: 32px 28px;
            background-image: radial-gradient(#FED2EB 1px, transparent 1px);
            background-size: 24px 24px;
            background-color: #fffbfe;
        }

        /* ตกแต่งริบบิ้นลูกไม้จำลองบริเวณหัวและท้ายบิล */
        .lace-edge {
            background-image: radial-gradient(circle at 10px 0, transparent 8px, #FED2EB 8px);
            background-size: 20px 12px;
            height: 12px;
            width: 100%;
        }

        /* ปุ่มกดสไตล์ Coquette นุ่มนวล โค้งมนพร้อมเอฟเฟกต์ยกตัว */
        .coquette-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border: 2px solid #ffffff;
            box-shadow: 0 4px 10px rgba(233, 207, 244, 0.6);
        }
        .coquette-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(254, 210, 235, 0.9);
        }
        
        .number-font {
            font-family: 'Kanit', sans-serif;
        }

        /* ของตกแต่งรูปโบว์น่ารักๆ */
        .bow-deco::before {
            content: "🎀";
            display: inline-block;
            margin-right: 6px;
        }
        .bow-deco::after {
            content: "🎀";
            display: inline-block;
            margin-left: 6px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- เซกชัน Login โทนสี Coquette วินเทจเกิร์ลลี่ -->
    <div id="login-section" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl shadow-2xl w-96 border-2 border-[#FED2EB] relative overflow-hidden">
            <div class="absolute -top-3 -left-3 text-2xl">🌸</div>
            <div class="absolute -bottom-3 -right-3 text-2xl">🌸</div>
            <h2 class="text-2xl font-bold mb-6 text-center text-[#9A66AC] bow-deco">เข้าสู่ระบบใบเสร็จ</h2>
            <div class="mb-4">
                <label class="block text-[#9A66AC] text-sm font-medium mb-2">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border-2 border-[#FED2EB] bg-[#fffbfe] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#E9CFF4]" value="admin">
            </div>
            <div class="mb-6">
                <label class="block text-[#9A66AC] text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border-2 border-[#FED2EB] bg-[#fffbfe] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#E9CFF4]" value="1234">
            </div>
            <button onclick="handleLogin()" class="w-full coquette-btn bg-[#FED2EB] text-[#9A66AC] font-semibold py-2.5 px-4 rounded-2xl hover:bg-[#E9CFF4] transition">Sign In 🩰</button>
            <p class="text-xs text-purple-400/70 mt-4 text-center">* Admin / 1234</p>
        </div>
    </div>

    <!-- เซกชันหลัก -->
    <div id="main-section" class="container mx-auto max-w-5xl hidden">
        <div class="flex justify-between items-center mb-6 bg-white/70 backdrop-blur-sm p-4 rounded-2xl border-2 border-[#FED2EB]">
            <h1 class="text-xl font-bold text-[#9A66AC] flex items-center gap-2 bow-deco">Coquette Receipt Studio</h1>
            <button onclick="handleLogout()" class="bg-[#E9CFF4] text-[#9A66AC] border border-[#ffffff] px-4 py-1.5 rounded-xl hover:bg-[#FED2EB] transition text-sm font-medium">Log Out</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <!-- ฝั่งซ้าย: ฟอร์มกรอกข้อมูล -->
            <div class="bg-white/90 p-6 rounded-3xl shadow-md border-2 border-[#E9CFF4]">
                <h3 class="text-md font-semibold mb-4 text-[#9A66AC] border-b-2 border-dashed border-[#FED2EB] pb-2">🩰 ดัดแปลงข้อมูลใบเสร็จ</h3>
                
                <div class="mb-4">
                    <label class="block text-xs font-medium text-purple-400">อัปโหลดโลโก้ร้าน</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewImage(this, 'logo-preview')" class="mt-1 block w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-2 file:border-[#FED2EB] file:text-xs file:font-medium file:bg-[#fffbfe] file:text-[#9A66AC] hover:file:bg-[#E9CFF4]">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-purple-400">ชื่อร้าน/หัวข้อหลัก</label>
                        <input type="text" id="shop-name-input" value="Kosame Store" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-purple-400">สโลแกน/ข้อความย่อย</label>
                        <input type="text" id="shop-sub-input" value="THANK YOU FOR YOUR ORDER" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-purple-400">ชื่อลูกค้า</label>
                        <input type="text" id="customer-name-input" value="คุณพิมพลอย ใจดี" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-purple-400">ช่องทางการซื้อขาย</label>
                        <input type="text" id="channel-input" value="Instagram" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-medium text-purple-400">Order ID</label>
                        <input type="text" id="order-id-input" value="#KS-889" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-purple-400">Time (เวลา)</label>
                        <input type="text" id="time-input" value="14:25" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-purple-400">Date (วันที่)</label>
                    <input type="text" id="date-input" value="07/07/2026" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold text-purple-500 mb-2">รายการสินค้าในใบเสร็จ</label>
                    <div id="items-container" class="space-y-2"></div>
                    <button onclick="addItemRow()" class="mt-2 text-xs bg-[#E9CFF4] text-[#9A66AC] border border-white font-medium px-3 py-1.5 rounded-xl hover:bg-[#FED2EB] transition">+ เพิ่มรายการสินค้า</button>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-purple-400">ข้อความขอบคุณ/หมายเหตุ (บนบัตรท้ายบิล)</label>
                    <input type="text" id="footer-note-input" value="✨ ได้รับสินค้าแล้ว อย่าลืมรีวิวแท็กมาอวดกันน้า ✨" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-medium text-purple-400">รูปภาพตกแต่งด้านล่างสุด (Footer Banner)</label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-1 block w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded-full file:border-2 file:border-[#FED2EB] file:text-xs file:font-medium file:bg-[#fffbfe] file:text-[#9A66AC] hover:file:bg-[#E9CFF4]">
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-medium text-purple-400">ข้อความหมายเหตุด้านล่างสุด (ใต้ Footer Banner)</label>
                    <input type="text" id="bottom-text-input" value="ขอบคุณที่อุดหนุนร้านเล็กๆ ของเรานะคะ ช่องทางติดต่อ Line: @kosamestore" class="mt-1 block w-full text-sm border-2 border-[#FED2EB] rounded-xl p-2 focus:ring-2 focus:ring-[#E9CFF4] focus:outline-none" oninput="updateReceipt()">
                </div>

                <button onclick="downloadReceiptImage()" class="w-full coquette-btn bg-[#FED2EB] text-[#9A66AC] font-bold py-3 rounded-2xl hover:bg-[#E9CFF4] transition mt-2 flex items-center justify-center gap-2">
                    🎀 🧸 ดาวน์โหลดใบเสร็จสุดหวาน 🧸 🎀
                </button>
            </div>
            <!-- ฝั่งขวา: พรีวิวใบเสร็จสไตล์ Coquette โทนสีหวานละมุน นำคำแปลออกตามสั่ง -->
            <div class="cute-receipt min-h-[700px] flex flex-col justify-between" id="receipt-print-area">
                <div>
                    <!-- ขอบลูกไม้จำลองด้านบนบิล -->
                    <div class="lace-edge -mt-4 mb-4 rounded-t-full opacity-60"></div>

                    <!-- ส่วนหัวร้านค้าโบว์ชมพู -->
                    <div class="text-center mb-6">
                        <div class="flex justify-center mb-2">
                            <div class="w-18 h-18 rounded-full overflow-hidden border-4 border-[#FED2EB] shadow-md bg-white p-1 flex items-center justify-center">
                                <img id="logo-preview" src="https://via.placeholder.com/150/fffbfe/9A66AC?text=%F0%9F%8E%80" alt="Logo" class="w-full h-full object-cover rounded-full">
                            </div>
                        </div>
                        <h2 id="shop-name-view" class="text-xl font-bold text-[#9A66AC] tracking-wide bow-deco">Kosame Store</h2>
                        <p id="shop-sub-view" class="text-[9px] text-[#A78BFA] font-semibold tracking-widest uppercase mt-0.5">THANK YOU FOR YOUR ORDER</p>
                    </div>

                    <!-- ข้อมูลลูกค้าและออเดอร์ นำคำแปลภาษาไทยออกเหลือแต่ภาษาอังกฤษล้วนตามคำสั่ง -->
                    <div class="grid grid-cols-2 gap-y-2 text-xs text-purple-400/90 mb-4 px-1">
                        <div><span class="font-medium text-[#9A66AC]/60">Customer:</span> <span id="customer-name-view" class="text-gray-700 font-medium"></span></div>
                        <div class="text-right"><span class="font-medium text-[#9A66AC]/60">Order ID:</span> <span id="order-id-view" class="text-gray-700 font-medium number-font"></span></div>
                        <div><span class="font-medium text-[#9A66AC]/60">Channel:</span> <span id="channel-view" class="text-[#9A66AC] font-medium"></span></div>
                        <div class="text-right"><span class="font-medium text-[#9A66AC]/60">Date:</span> <span id="date-view" class="number-font text-gray-600"></span></div>
                        <div></div>
                        <div class="text-right"><span class="font-medium text-[#9A66AC]/60">Time:</span> <span id="time-view" class="number-font text-gray-600"></span></div>
                    </div>

                    <!-- ริบบิ้นคั่นกลางลายริ้วโบว์ชมพูพาสเทล -->
                    <div class="border-b-2 border-dashed border-[#FED2EB] my-4"></div>

                    <!-- รายการสินค้า -->
                    <div id="receipt-items-view" class="space-y-4 my-4 text-xs text-gray-700"></div>
                </div>

                <div>
                    <div class="border-b-2 border-dashed border-[#FED2EB] my-4"></div>
                    
                    <!-- ส่วนยอดรวม ปรับเป็นคำว่า Total สั้นๆ สไตล์มินิมอลลูกคุณ -->
                    <div class="bg-gradient-to-r from-[#E9CFF4]/30 via-[#FED2EB]/40 to-[#C3E0F6]/30 rounded-2xl p-3 flex justify-between items-center mb-4 px-4 border-2 border-[#FED2EB]">
                        <span class="text-xs font-bold text-[#9A66AC] tracking-wider uppercase">Total</span>
                        <span class="text-base font-bold text-[#9A66AC] number-font">฿<span id="total-amount-view">0.00</span></span>
                    </div>

                    <!-- ช่องแสดงผลข้อความด้านบนแบนเนอร์ -->
                    <div id="footer-note-view" class="text-center text-[11px] text-[#9A66AC] font-medium my-3 px-2 bg-[#FED2EB]/20 py-2 rounded-xl border border-[#FED2EB]/50 italic"></div>

                    <!-- รูปแบนเนอร์ -->
                    <div class="mt-2 flex justify-center">
                        <img id="footer-preview" src="https://via.placeholder.com/340x80/FED2EB/9A66AC?text=%F0%9F%8E%80+Thank+You+so+much+%F0%9F%8E%80" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-[#FED2EB]">
                    </div>

                    <!-- บรรทัดแสดงผลใต้แบนเนอร์ท้ายสุด -->
                    <div id="bottom-text-view" class="text-center text-[10px] text-[#9A66AC]/70 font-light mt-3 px-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้องน้า 😭🎀');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-[#FED2EB]/10 p-2 rounded-xl border-2 border-[#FED2EB]/40">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-[#FED2EB] rounded-lg p-1.5 text-xs focus:outline-none">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-[#FED2EB] rounded-lg p-1.5 text-xs text-center focus:outline-none">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-[#FED2EB] rounded-lg p-1.5 text-xs text-right focus:outline-none">
                        <button onclick="removeItemRow(${index})" class="text-rose-400 font-bold px-1 text-xs hover:text-rose-600">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-medium text-gray-700">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-[#9A66AC]/70 mt-0.5 number-font">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="number-font text-gray-600 text-right pt-0.5">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#fffbfe',
                borderRadius: '24px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `coquette-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('เกิดข้อผิดพลาดในการบันทึกรูปภาพ:', error);
                alert('ไม่สามารถบันทึกภาพได้ ลองใหม่อีกครั้งนะริบบิ้นสีชมพูอาจจะหลุดขัดข้อง 🎀');
            });
        }
    </script>
</body>
</html>
