<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Igari Receipt Studio 🍧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=BM+Jua&family=Itim&family=Chonburi&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'BM Jua', 'Itim', 'Chonburi', sans-serif; background-color: #F4F4F4; }
        .minimal-play-receipt { background-color: #ffffff; border-radius: 28px; border: 4px dashed #BE2C1F; padding: 20px; }
        .input-minimal { border: 2px solid #E2E8F0; border-radius: 18px; padding: 10px; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="container mx-auto max-w-4xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- ส่วนที่ให้กรอกข้อมูล -->
            <div class="bg-white p-6 rounded-3xl shadow-lg">
                <h2 class="text-xl font-bold mb-4">เมนูแก้ไข 🐾</h2>
                <input type="text" id="shop-name-input" placeholder="ชื่อร้าน" class="input-minimal mb-2" oninput="updateReceipt()">
                
                <div class="mt-4">
                    <label class="block text-sm mb-2">อัปโหลดรูปด้านล่าง:</label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewFooter(this)">
                    <button onclick="removeFooter()" class="text-xs text-red-500 mt-2 underline">ลบรูป Banner ออก</button>
                </div>

                <button onclick="downloadReceipt()" class="w-full bg-[#BE2C1F] text-white py-3 rounded-2xl mt-6">ดาวน์โหลดใบเสร็จ 📸</button>
            </div>

            <!-- ส่วน Preview ใบเสร็จ -->
            <div id="receipt-print-area" class="minimal-play-receipt">
                <h1 id="shop-name-view" class="text-2xl font-bold text-center">ชื่อร้านของคุณ</h1>
                
                <!-- รูป Footer Banner (เริ่มแรกจะซ่อนอยู่) -->
                <div id="footer-container" class="mt-4 flex justify-center hidden">
                    <img id="footer-preview" src="" class="max-w-[200px] rounded-xl">
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value || 'ชื่อร้านของคุณ';
        }

        function previewFooter(input) {
            const preview = document.getElementById('footer-preview');
            const container = document.getElementById('footer-container');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.classList.remove('hidden'); // แสดงรูป
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeFooter() {
            const container = document.getElementById('footer-container');
            container.classList.add('hidden'); // ซ่อนรูป
            document.getElementById('footer-img-input').value = ""; // เคลียร์ไฟล์ที่เลือก
        }

        function downloadReceipt() {
            html2canvas(document.getElementById('receipt-print-area')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'my-receipt.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
