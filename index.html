<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 Minimal Playground Receipt Studio 🧃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: #F0F9FF;
            color: #7E6763;
            overflow-x: hidden;
        }
        
        .text-playground-main { color: #7E6763; }
        .border-playground { border-color: #7E6763; }

        /* ================= ANIMATIONS ================= */
        @keyframes soft-floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes wiggle-slow {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes cloud-move-slow {
            0% { transform: translateX(-10%); }
            100% { transform: translateX(110vw); }
        }
        @keyframes sun-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes tree-sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(2deg); }
        }

        .animate-float { animation: soft-floating 3s ease-in-out infinite; }
        .animate-wiggle { animation: wiggle-slow 2.5s ease-in-out infinite; }
        
        /* ================= BACKGROUND STYLING ================= */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(135deg, #E0F2FE 0%, #F0FDFA 100%);
        }
        .bg-sun {
            position: absolute;
            top: 40px;
            right: 50px;
            width: 50px;
            height: 50px;
            color: #FED7AA;
            animation: sun-spin 20s linear infinite;
        }
        .bg-cloud-1 {
            position: absolute;
            top: 15%;
            left: -100px;
            color: #FFFFFF;
            opacity: 0.8;
            animation: cloud-move-slow 45s linear infinite;
        }
        .bg-cloud-2 {
            position: absolute;
            top: 35%;
            left: -120px;
            color: #FFFFFF;
            opacity: 0.6;
            animation: cloud-move-slow 60s linear infinite;
            animation-delay: -15s;
        }
        .bg-tree-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
        }
        .bg-tree {
            width: 45px;
            height: 60px;
            color: #BBF7D0;
            transform-origin: bottom center;
            animation: tree-sway 4s ease-in-out infinite;
        }
        .bg-tree-2 {
            animation-delay: -1.5s;
            color: #86EFAC;
            width: 38px;
        }

        /* ================= RECEIPT STYLING ================= */
        .minimal-play-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 24px;
            border: 3px dashed #BAE6FD;
            box-shadow: 0 10px 30px rgba(186, 230, 253, 0.2);
            padding: 36px 28px;
            background-image: radial-gradient(#FFEDD5 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        .decor-item {
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }
        .play-mini-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-mini-btn:hover {
            transform: translateY(-1px) scale(1.01);
            filter: brightness(0.98);
        }
        .play-mini-btn:active {
            transform: translateY(1px);
        }
        .input-minimal {
            border: 2px solid #E2E8F0;
            border-radius: 14px;
            transition: all 0.2s ease;
            background-color: #FAFAFA;
            color: #7E6763;
        }
        .input-minimal:focus {
            border-color: #7DD3FC;
            background-color: #ffffff;
            outline: none;
        }
        .icon-mini {
            width: 16px;
            height: 16px;
            display: inline-block;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- แอนิเมชันพื้นหลัง ดุ๊กดิ๊ก ขยับได้ -->
    <div class="animated-bg">
        <!-- พระอาทิตย์ -->
        <div class="bg-sun">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </div>
        <!-- ก้อนเมฆ -->
        <div class="bg-cloud-1">
            <svg width="65" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
        </div>
        <div class="bg-cloud-2">
            <svg width="50" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>
        </div>
        <!-- ต้นไม้ด้านล่างจอ -->
        <div class="bg-tree-container">
            <div class="bg-tree"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M12 5L7 10M12 5l5 5M12 12l-4 4M12 9l5 5" stroke-width="2.5"/></svg></div>
            <div class="bg-tree bg-tree-2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M12 5L7 10M12 5l5 5M12 12l-4 4M12 9l5 5" stroke-width="2.5"/></svg></div>
        </div>
    </div>

    <!-- ล็อกอิน -->
    <div id="login-section" class="flex items-center justify-center min-h-[80vh]">
        <div class="bg-white/90 backdrop-blur-md p-8 rounded-3xl w-96 border-2 border-[#7DD3FC] shadow-sm animate-float">
            <h2 class="text-lg font-medium mb-6 text-center text-playground-main tracking-wider flex items-center justify-center gap-2">
                <span class="animate-wiggle text-orange-300 icon-mini">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22V2m0 0L5 8h14L12 2z"/></svg>
                </span> 
                SIGN IN PLAYGROUND
            </h2>
            <div class="mb-4">
                <label class="block text-slate-500 text-xs font-medium mb-1.5 uppercase tracking-wider">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 input-minimal text-sm font-light" placeholder="ระบุผู้ใช้งาน">
            </div>
            <div class="mb-6">
                <label class="block text-slate-500 text-xs font-medium mb-1.5 uppercase tracking-wider">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 input-minimal text-sm font-light" placeholder="ระบุรหัสผ่าน">
            </div>
            <button onclick="handleLogin()" class="w-full play-mini-btn bg-[#7DD3FC] text-white font-medium py-2.5 rounded-xl text-sm shadow-sm tracking-wide">ENTER STUDIO 🎪</button>
        </div>
    </div>

    <!-- เมนหลักแผงควบคุม -->
    <div id="main-section" class="container mx-auto max-w-5xl hidden">
        <div class="flex justify-between items-center mb-8 bg-white/80 backdrop-blur-sm p-4 rounded-2xl border-2 border-slate-100 shadow-sm">
            <h1 class="text-sm font-medium text-playground-main tracking-wide flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-[#7DD3FC] animate-ping"></span> Playground Studio (Minimal Light)
            </h1>
            <button onclick="handleLogout()" class="bg-slate-100 text-slate-500 border border-slate-200 px-3 py-1 rounded-xl hover:bg-slate-200 transition text-xs font-medium">Log Out</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <!-- ตัวกรอกข้อมูลฟอร์ม -->
            <div class="bg-white p-6 rounded-3xl border-2 border-slate-100 shadow-sm">
                <h3 class="text-xs font-medium mb-6 text-playground-main uppercase tracking-wider border-b-2 border-slate-100 pb-3 flex items-center gap-2">
                    <span class="icon-mini text-sky-400 animate-wiggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </span>
                    Receipt Editor Studio
                </h3>
                
                <div class="mb-4">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                        <span class="icon-mini text-sky-400"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span>
                        อัปโหลดโลโก้ร้าน
                    </label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewImage(this, 'logo-preview')" class="mt-1.5 block w-full text-xs text-slate-400 file:mr-4 file:py-1 file:px-3 file:rounded-xl file:border file:border-slate-200 file:text-xs file:font-medium file:bg-white file:text-slate-600">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-orange-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>
                            ชื่อร้าน/หัวข้อหลัก
                        </label>
                        <input type="text" id="shop-name-input" value="pattira だ" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-sky-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
                            สโลแกน/ข้อความย่อย
                        </label>
                        <input type="text" id="shop-sub-input" value="THANK YOU FOR YOUR ORDER" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-emerald-400"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                            ชื่อลูกค้า
                        </label>
                        <input type="text" id="customer-name-input" value="คุณพิมพลอย ใจดี" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-orange-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M8.56 2.75c4.37-2.26 9.3.33 10.5 4.87M2 12h20"/></svg></span>
                            ช่องทางการซื้อขาย
                        </label>
                        <input type="text" id="channel-input" value="Instagram" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-sky-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
                            Order ID
                        </label>
                        <input type="text" id="order-id-input" value="#KS-889" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                    <div>
                        <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                            <span class="icon-mini text-orange-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
                            Time (เวลา)
                        </label>
                        <input type="text" id="time-input" value="14:25" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                        <span class="icon-mini text-emerald-400"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
                        Date (วันที่)
                    </label>
                    <input type="text" id="date-input" value="07/07/2026" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-playground-main mb-2">
                        <span class="icon-mini text-sky-400"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg></span>
                        รายการสินค้าในใบเสร็จ
                    </label>
                    <div id="items-container" class="space-y-2"></div>
                    <button onclick="addItemRow()" class="mt-2.5 text-xs bg-slate-50 text-slate-600 border border-slate-200 font-medium px-3 py-1.5 rounded-xl hover:bg-slate-100 transition flex items-center gap-1">
                        <span>+</span> เพิ่มรายการสินค้า
                    </button>
                </div>

                <div class="mb-4">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                        <span class="icon-mini text-orange-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>
                        ข้อความขอบคุณ/หมายเหตุ
                    </label>
                    <input type="text" id="footer-note-input" value="ได้รับสินค้าแล้ว อย่าลืมรีวิวแท็กมาอวดกันน้า" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <div class="mb-4">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                        <span class="icon-mini text-sky-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></span>
                        รูปภาพตกแต่งด้านล่างสุด (Footer Banner)
                    </label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-1.5 block w-full text-xs text-slate-400 file:mr-4 file:py-1 file:px-3 file:rounded-xl file:border file:border-slate-200">
                </div>

                <div class="mb-6">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                        <span class="icon-mini text-emerald-400"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                        ข้อความหมายเหตุด้านล่างสุด
                    </label>
                    <input type="text" id="bottom-text-input" value="ขอบคุณที่อุดหนุนร้านเล็กๆ ของเรานะคะ ช่องทางติดต่อ Line: @kosamestore" class="mt-1.5 block w-full text-sm font-light input-minimal p-2" oninput="updateReceipt()">
                </div>

                <button onclick="downloadReceiptImage()" class="w-full play-mini-btn bg-[#FDBA74] text-white font-medium py-3 rounded-xl transition mt-2 shadow-sm text-sm tracking-wider">
                    DOWNLOAD MINIMAL RECEIPT
                </button>
            </div>

            <!-- โซนพรีวิวใบเสร็จและตกแต่งกราฟิกนอกกรอบ -->
            <div class="relative p-4">
                <div class="decor-item -top-2 -left-2 animate-float text-orange-300 w-5 h-5">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3" fill="currentColor"/><circle cx="12" cy="5" r="2.5"/><circle cx="12" cy="19" r="2.5"/><circle cx="5" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg>
                </div>
                <div class="decor-item top-1/4 -right-2 animate-wiggle text-sky-300 w-4 h-4" style="animation-delay: 0.5s;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.5 6.5L21 11l-5 4.5L17.5 22 12 18.5 6.5 22 8 15.5 3 11l6.5-2.5Z"/></svg>
                </div>
                <div class="decor-item top-2/4 -left-4 animate-float text-emerald-300 w-4 h-4" style="animation-delay: 1s;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H7M19 9H5"/></svg>
                </div>
                <div class="decor-item -bottom-2 left-1/4 animate-wiggle text-sky-200 w-5 h-5" style="animation-delay: 0.2s;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                </div>

                <div class="minimal-play-receipt min-h-[660px] flex flex-col justify-between" id="receipt-print-area">
                    <div class="absolute top-4 left-4 text-sky-200/60 w-3 h-3 select-none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2 5 5 2-5 2-2 5-2-5-5-2 5-2Z"/></svg></div>
                    <div class="absolute top-4 right-4 text-orange-200/60 w-3 h-3 select-none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/></svg></div>
                    <div class="absolute bottom-4 left-4 text-emerald-200/60 w-3 h-3 select-none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2z"/></svg></div>
                    <div class="absolute bottom-4 right-4 text-sky-200/60 w-3 h-3 select-none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M22 12H2"/></svg></div>

                    <div>
                        <div class="flex justify-center mb-4 animate-float">
                            <div class="w-14 h-14 rounded-2xl overflow-hidden border-2 border-[#BAE6FD] bg-white p-1 flex items-center justify-center shadow-sm">
                                <img id="logo-preview" src="https://via.placeholder.com/150/fff/0369A1?text=%F0%9F%A7%A9" alt="Logo" class="w-full h-full object-cover rounded-xl">
                            </div>
                        </div>

                        <div class="text-center mb-6">
                            <h2 id="shop-name-view" class="text-xl font-medium text-playground-main tracking-wide">pattira だ</h2>
                            <p id="shop-sub-view" class="text-[9px] text-slate-400 font-medium tracking-widest uppercase mt-1">THANK YOU FOR YOUR ORDER</p>
                        </div>

                        <div class="grid grid-cols-2 gap-y-2 text-xs font-light text-slate-400 mb-4 px-1">
                            <div><span>Customer:</span> <span id="customer-name-view" class="text-playground-main font-normal ml-1"></span></div>
                            <div class="text-right"><span>Order ID:</span> <span id="order-id-view" class="text-playground-main font-normal ml-1"></span></div>
                            <div><span>Channel:</span> <span id="channel-view" class="text-slate-500 font-normal ml-1"></span></div>
                            <div class="text-right"><span>Date:</span> <span id="date-view" class="text-slate-500 ml-1"></span></div>
                            <div></div>
                            <div class="text-right"><span>Time:</span> <span id="time-view" class="text-slate-500 ml-1"></span></div>
                        </div>

                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>

                        <div id="receipt-items-view" class="space-y-4 my-4 text-xs font-light text-playground-main"></div>
                    </div>

                    <div>
                        <div class="border-b-2 border-dashed border-slate-100 my-4"></div>
                        
                        <div class="bg-[#FFF7ED] rounded-xl p-3 flex justify-between items-center mb-4 px-4 border border-[#FFEDD5]">
                            <span class="text-xs font-medium text-orange-400 tracking-wider uppercase flex items-center gap-1.5">
                                TOTAL 
                                <span class="icon-mini text-orange-300"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.5 6.5L21 11l-5 4.5L17.5 22 12 18.5 6.5 22 8 15.5 3 11l6.5-2.5Z"/></svg></span>
                            </span>
                            <span class="text-md font-medium text-playground-main">฿<span id="total-amount-view">0.00</span></span>
                        </div>

                        <div id="footer-note-view" class="text-center text-[10px] text-emerald-700 font-light my-3 px-3 bg-[#E6F4EA]/60 py-2 rounded-xl border border-[#D1FAE5] animate-wiggle"></div>

                        <div class="mt-2 flex justify-center">
                            <img id="footer-preview" src="https://via.placeholder.com/340x60/F0F9FF/0369A1?text=%F0%9F%A2%9D+HAVE+A+GOOD+PLAYTIME+%F0%9F%A2%9D" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-slate-100">
                        </div>

                        <div id="bottom-text-view" class="text-center text-[9px] text-slate-400 font-light mt-4 px-2 tracking-wide"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // เปลี่ยนเงื่อนไขการตรวจสอบสิทธิ์ตามที่กำหนด
            if(user === 'minnek1256' && pass === 'yinkza1256') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                initData();
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง 😭');
            }
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
            // ล้างค่าในฟิลด์ล็อกอินหลังจากเอาต์
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs font-light focus:outline-none focus:border-slate-400">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-center focus:outline-none focus:border-slate-400">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-slate-200 rounded-lg p-1.5 text-xs font-light text-right focus:outline-none focus:border-slate-400">
                        <button onclick="removeItemRow(${index})" class="text-slate-400 font-light px-1 text-xs hover:text-rose-500">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start tracking-wide">
                        <div>
                            <div class="font-normal text-playground-main">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-slate-400 font-light mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-normal text-slate-500 text-right pt-0.5">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#ffffff',
                borderRadius: '24px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `minimal-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('Error generating canvas:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง');
            });
        }
    </script>
</body>
</html>
