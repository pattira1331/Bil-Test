<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍓 Igari Receipt Studio 🍧</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- นำเข้าฟอนต์ BM Jua สำหรับภาษาอังกฤษ และฟอนต์ไทยสไตล์เส้นดินสอหัวกลมมนละมุนตา -->
    <link href="https://fonts.googleapis.com/css2?family=BM+Jua&family=Itim&family=Chonburi&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            /* กำหนด Font Family ภาษาอังกฤษใช้ BM Jua ภาษาไทยใช้สไตล์เส้นดินสอกลมมนอย่าง Itim และ Chonburi */
            font-family: 'BM Jua', 'Itim', 'Chonburi', sans-serif;
            font-weight: 400;
            background-color: #F4F4F4;
            color: #252C36;
            overflow-x: hidden;
            position: relative;
        }
        
        .text-igari-main { color: #252C36; }
        .border-igari { border-color: #252C36; }

        /* ================= ANIMATIONS ================= */
        @keyframes igari-flush {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px rgba(37,44,54,0.08)); }
            50% { transform: translateY(-6px) scale(1.02); filter: drop-shadow(0 0 14px rgba(37,44,54,0.15)); }
        }
        @keyframes heart-beat {
            0%, 100% { transform: scale(1) rotate(-4deg); }
            50% { transform: scale(1.12) rotate(4deg); }
        }
        @keyframes puff-twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.85); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        @keyframes float-cute {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-10px) rotate(8deg) scale(1.08); }
        }
        @keyframes twinkle-sparkle {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0.3) rotate(0deg); }
            50% { opacity: 1; transform: translateY(-30px) scale(1.2) rotate(180deg); }
            100% { opacity: 0; transform: translateY(-60px) scale(0.3) rotate(360deg); }
        }
        
        /* แอนิเมชันดุ๊กดิ๊กใหม่สำหรับไอคอนทุกจุด */
        @keyframes cute-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @keyframes cute-wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
        }
        
        .animate-igari { animation: igari-flush 3.8s ease-in-out infinite; }
        .animate-heart { animation: heart-beat 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .animate-puff { animation: puff-twinkle 2.2s ease-in-out infinite; }
        .animate-bg-cute { animation: float-cute 4.5s ease-in-out infinite; }
        .animate-cute-bounce { animation: cute-bounce 1.8s ease-in-out infinite; }
        .animate-cute-wiggle { animation: cute-wiggle 1.4s ease-in-out infinite; }
        
        /* ================= GRID PATTERN BACKGROUND ================= */
        .stripes-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #F5F5F3;
            background-image: 
                linear-gradient(rgba(37, 44, 54, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 44, 54, 0.025) 1px, transparent 1px);
            background-size: 26px 26px;
        }

        .igari-blush-bg {
            position: fixed;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(210, 0, 0, 0.08) 0%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
            pointer-events: none;
        }

        .bg-element-cute {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            object-fit: contain;
            opacity: 0.85;
        }

        .sparkle-item {
            position: absolute;
            pointer-events: none;
            animation: twinkle-sparkle ease-in-out infinite;
            z-index: 60;
        }

        /* ================= RECEIPT & EDITOR STYLING ================= */
        .minimal-play-receipt {
            background-color: #ffffff;
            position: relative;
            border-radius: 32px;
            border: 4px dashed #BE2C1F;
            box-shadow: 0 20px 40px rgba(37, 44, 54, 0.06);
            padding: 22px 24px; /* กระชับขอบใบเสร็จให้สั้นลง */
            background-image: radial-gradient(rgba(210, 0, 0, 0.015) 1.5px, transparent 1.5px);
            background-size: 20px 20px;
        }
        
        /* เพิ่มลาย Polkadot ให้ฝั่งกรอกข้อมูลที่มีช่องอินพุต */
        .polkadot-editor-panel {
            background-color: rgba(255, 255, 255, 0.95);
            background-image: radial-gradient(rgba(37, 44, 54, 0.02) 2px, transparent 2px);
            background-size: 20px 20px;
        }
        
        .play-mini-btn {
            font-family: 'BM Jua', 'Itim', 'Chonburi', sans-serif;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .play-mini-btn:hover {
            transform: translateY(-2.5px) scale(1.015);
            box-shadow: 0 10px 20px rgba(37, 44, 54, 0.15);
        }
        .play-mini-btn:active {
            transform: translateY(1px);
        }
        .input-minimal {
            border: 2px solid #E2E8F0;
            border-radius: 18px;
            transition: all 0.2s ease;
            background-color: #FAFAFA;
            color: #252C36;
            font-family: 'BM Jua', 'Itim', 'Chonburi', sans-serif;
            font-weight: 400;
        }
        .input-minimal:focus {
            border-color: #BE2C1F;
            background-color: #ffffff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(190, 44, 31, 0.12);
        }
        .icon-mini {
            width: 22px;
            height: 22px;
            display: inline-block;
            flex-shrink: 0;
        }
        
        /* สไตล์ขอบหยักบน-ล่างแบบแสตมป์สำหรับ Igari Style */
        .igari-zigzag-top {
            background-image: linear-gradient(-45deg, transparent 4px, #BE2C1F 4px, #BE2C1F 6px, transparent 6px), 
                              linear-gradient(45deg, transparent 4px, #BE2C1F 4px, #BE2C1F 6px, transparent 6px);
            background-size: 12px 12px;
            background-repeat: repeat-x;
            height: 8px;
            width: 100%;
            opacity: 0.35;
        }
    </style>
</head>

    <!-- Login Section -->

                        รูปภาพตกแต่งด้านล่างสุด (Footer Banner)
                    </label>
                    <input type="file" id="footer-img-input" accept="image/*" onchange="previewImage(this, 'footer-preview')" class="mt-2 block w-full text-xs text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-xl file:border file:border-slate-200">
                </div>

                <div class="mb-6">
                    <label class="flex items-center gap-1.5 text-xs font-medium text-slate-400">
                        <span class="icon-mini text-[#BE2C1F] animate-cute-bounce"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                        ข้อความหมายเหตุด้านล่างสุด
                    </label>
                    <input type="text" id="bottom-text-input" value="ขอบคุณที่อุดหนุนร้านเล็กๆ ของเรานะคะ ช่องทางติดต่อ Line: @kosamestore" class="mt-1.5 block w-full text-sm input-minimal p-2.5" oninput="updateReceipt()">
                </div>

                <button onclick="downloadReceiptImage()" class="w-full play-mini-btn bg-[#BE2C1F] text-white font-medium py-3.5 rounded-2xl transition mt-2 shadow-md tracking-wider hover:bg-[#911f14] text-base">
                    DOWNLOAD IGARI RECEIPT
                </button>
            </div>
            
            <!-- Receipt Preview Area -->
            <div class="relative p-2 md:sticky md:top-4">
                <div class="minimal-play-receipt flex flex-col justify-between overflow-hidden" id="receipt-print-area">
                    
                    <!-- ================= CUTE SMALL ICONS DECORATIONS ================= -->
                    <img src="https://i.postimg.cc/vmft9YC4/star.png" class="absolute top-[22%] left-[8%] w-4 h-4 opacity-[0.08] animate-cute-bounce pointer-events-none">
                    <img src="https://i.postimg.cc/YSYzgrT4/mi-m-ch-x-682-20260708221022.png" class="absolute top-[32%] right-[10%] w-5 h-5 opacity-[0.08] animate-cute-wiggle pointer-events-none">
                    <img src="https://i.postimg.cc/yY5cxx7H/mi-m-ch-x-682-20260708223709.png" class="absolute top-[55%] left-[5%] w-3 h-3 opacity-[0.12] pointer-events-none">
                    <img src="https://i.postimg.cc/TPgJmdBL/mi-m-ch-x-682-20260708221123.png" class="absolute bottom-[28%] right-[8%] w-4 h-4 opacity-[0.08] animate-cute-bounce pointer-events-none">
                    <img src="https://i.postimg.cc/vmft9YC4/star.png" class="absolute bottom-[40%] left-[12%] w-3.5 h-3.5 opacity-[0.08] animate-cute-wiggle pointer-events-none">

                    <!-- ไอคอนประจำมุม 4 ทิศ -->
                    <div class="absolute top-3 left-3 opacity-20 w-4 h-4 select-none animate-cute-bounce">
                        <img src="https://i.postimg.cc/YSYzgrT4/mi-m-ch-x-682-20260708221022.png" class="w-full h-full object-contain">
                    </div>
                    <div class="absolute top-3 right-3 opacity-25 w-4 h-4 select-none animate-cute-wiggle">
                        <img src="https://i.postimg.cc/vmft9YC4/star.png" class="w-full h-full object-contain">
                    </div>
                    <div class="absolute bottom-3 left-3 opacity-20 w-4 h-4 select-none animate-cute-wiggle">
                        <img src="https://i.postimg.cc/TPgJmdBL/mi-m-ch-x-682-20260708221123.png" class="w-full h-full object-contain">
                    </div>
                    <div class="absolute bottom-3 right-3 opacity-20 w-4 h-4 select-none animate-cute-bounce">
                        <img src="https://i.postimg.cc/yY5cxx7H/mi-m-ch-x-682-20260708223709.png" class="w-full h-full object-contain">
                    </div>

                    <!-- ตกแต่งสไตล์ Igari ด้วยขอบหยักซิกแซกคู่สไตล์แสตมป์แทนแถบลูกไม้เดิม -->
                    <div class="w-full px-2 mb-3">
                        <div class="igari-zigzag-top"></div>
                    </div>

                    <div>
                        <!-- ส่วนของโลโก้ เปลี่ยนสีขอบเป็นสี BE2C1F ตามบรีฟ -->
                        <div class="flex justify-center mb-1.5 relative">
                            <img src="https://i.postimg.cc/yY5cxx7H/mi-m-ch-x-682-20260708223709.png" class="absolute -top-1 -left-2 w-5 h-5 opacity-40 animate-cute-wiggle">
                            <img src="https://i.postimg.cc/vmft9YC4/star.png" class="absolute -bottom-1 -right-2 w-5 h-5 opacity-40 animate-cute-bounce">
                            
                            <div class="w-24 h-24 rounded-2xl overflow-hidden border-4 border-[#BE2C1F] bg-white p-1 flex items-center justify-center shadow-md animate-igari">
                                <img id="logo-preview" src="https://via.placeholder.com/150/fff/BE2C1F?text=%E2%9D%A4%EF%B8%8F" alt="Logo" class="w-full h-full object-cover rounded-xl">
                            </div>
                        </div>

                        <!-- ปรับส่วนหัวร้าน -->
                        <div class="text-center mb-3 relative">
                            <h2 id="shop-name-view" class="text-xl font-semibold text-igari-main tracking-wide">pattira だ</h2>
                            <p id="shop-sub-view" class="text-[9px] text-slate-400 font-medium tracking-widest uppercase mt-0.5">THANK YOU FOR YOUR ORDER</p>
                        </div>

                        <!-- ข้อมูลลูกค้า -->
                        <div class="grid grid-cols-2 gap-y-1 text-[11px] font-normal text-slate-400 mb-1 px-1">
                            <div><span>Customer:</span> <span id="customer-name-view" class="text-igari-main font-medium ml-1"></span></div>
                            <div class="text-right flex items-center justify-end gap-1"><span>Order ID:</span> <span id="order-id-view" class="text-igari-main font-medium"></span></div>
                            <div><span>Channel:</span> <span id="channel-view" class="text-slate-500 font-medium ml-1"></span></div>
                            <div class="text-right"><span>Date:</span> <span id="date-view" class="text-slate-500 ml-1"></span></div>
                            <div></div>
                            <div class="text-right"><span>Time:</span> <span id="time-view" class="text-slate-500 ml-1"></span></div>
                        </div>

                        <div class="border-b-2 border-dashed border-slate-100 my-2"></div>

                        <!-- รายการสินค้า -->
                        <div id="receipt-items-view" class="space-y-2 my-2 text-xs font-normal text-igari-main"></div>
                    </div>

                    <div>
                        <div class="border-b-2 border-dashed border-slate-100 my-2"></div>
                        
                        <!-- ปรับขนาดกล่องยอดรวมให้ผอมลงและสั้นลงอย่างสวยงาม -->
                        <div class="bg-[#252C36]/5 rounded-xl p-2 flex justify-between items-center mb-2 px-4 border border-[#252C36]/10 relative">
                            <span class="text-[11px] font-bold text-[#252C36] tracking-wider uppercase flex items-center gap-1.5">
                                TOTAL 
                                <span class="icon-mini text-[#BE2C1F] animate-heart opacity-40">
                                    <img src="https://i.postimg.cc/YSYzgrT4/mi-m-ch-x-682-20260708221022.png" class="w-full h-full object-contain">
                                </span>
                            </span>
                            <span class="text-lg font-bold text-igari-main">฿<span id="total-amount-view">0.00</span></span>
                        </div>

                        <div id="footer-note-view" class="text-center text-[11px] text-[#252C36] font-medium my-1.5 px-3 bg-[#BE2C1F]/5 py-1.5 rounded-xl border border-[#BE2C1F]/10 animate-igari"></div>

                        <div class="mt-1 flex justify-center relative">
                            <img id="footer-preview" src="https://via.placeholder.com/340x60/252C36/ffffff?text=%E2%9D%A4%EF%B8%8F+FLUSH+BLUSH+PLAYROOM+%E2%9D%A4%EF%B8%8F" alt="Footer Banner" class="max-w-full h-auto rounded-xl object-contain border border-slate-100">
                        </div>

                        <div id="bottom-text-view" class="text-center text-[9px] text-slate-400 font-normal mt-2 px-2 tracking-wide"></div>
                        
                        <!-- ขอบหยักปิดท้ายใบเสร็จสไตล์ Igari แสตมป์ -->
                        <div class="w-full px-2 mt-3 rotate-180">
                            <div class="igari-zigzag-top"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let items = [
            { name: 'เค้กสตรอว์เบอร์รี่ครีมสด', qty: 2, price: 85.00 },
            { name: 'ชานมพาสเทลลาเต้', qty: 1, price: 55.00 }
        ];

        let sparkleInterval;

        function handleLogin() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            clearInterval(sparkleInterval); 
            initData();
        }

        function handleLogout() {
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('main-section').classList.add('hidden');
            startLoginSparkles(); 
        }

        function initData() {
            renderItemInputs();
            updateReceipt();
        }

        function renderItemInputs() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex gap-2 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <input type="text" value="${item.name}" oninput="editItem(${index}, 'name', this.value)" placeholder="สินค้า" class="flex-1 border border-slate-200 rounded-lg p-1.5 text-xs font-normal focus:outline-none focus:border-slate-400 text-igari-main">
                        <input type="number" value="${item.qty}" oninput="editItem(${index}, 'qty', this.value)" placeholder="จำนวน" class="w-12 border border-slate-200 rounded-lg p-1.5 text-xs font-normal text-center focus:outline-none focus:border-slate-400 text-igari-main">
                        <input type="number" value="${item.price}" oninput="editItem(${index}, 'price', this.value)" placeholder="ราคา" class="w-16 border border-slate-200 rounded-lg p-1.5 text-xs font-normal text-right focus:outline-none focus:border-slate-400 text-igari-main">
                        <button onclick="removeItemRow(${index})" class="text-slate-400 font-normal px-1 text-xs hover:text-rose-500">✕</button>
                    </div>
                `;
            });
        }

        function addItemRow() {
            items.push({ name: '', qty: 1, price: 0 });
            renderItemInputs();
            updateReceipt();
        }

        function removeItemRow(index) {
            items.splice(index, 1);
            renderItemInputs();
            updateReceipt();
        }

        function editItem(index, key, value) {
            items[index][key] = key === 'name' ? value : Number(value);
            updateReceipt();
        }

        function updateReceipt() {
            document.getElementById('shop-name-view').innerText = document.getElementById('shop-name-input').value;
            document.getElementById('shop-sub-view').innerText = document.getElementById('shop-sub-input').value;
            document.getElementById('customer-name-view').innerText = document.getElementById('customer-name-input').value;
            document.getElementById('channel-view').innerText = document.getElementById('channel-input').value;
            document.getElementById('order-id-view').innerText = document.getElementById('order-id-input').value;
            document.getElementById('date-view').innerText = document.getElementById('date-input').value;
            document.getElementById('time-view').innerText = document.getElementById('time-input').value;
            
            document.getElementById('footer-note-view').innerText = document.getElementById('footer-note-input').value;
            document.getElementById('bottom-text-view').innerText = document.getElementById('bottom-text-input').value;

            const itemsContainer = document.getElementById('receipt-items-view');
            itemsContainer.innerHTML = '';
            let total = 0;

            items.forEach(item => {
                const subtotal = item.qty * item.price;
                total += subtotal;
                
                itemsContainer.innerHTML += `
                    <div class="flex justify-between items-start tracking-wide">
                        <div>
                            <div class="font-medium text-igari-main text-[12px]">${item.name || 'ยังไม่ระบุสินค้า'}</div>
                            <div class="text-[10px] text-slate-400 font-normal mt-0.5">@${item.price.toFixed(2)} x ${item.qty}</div>
                        </div>
                        <div class="font-medium text-slate-500 text-right pt-0.5 text-[12px]">${subtotal.toFixed(2)}</div>
                    </div>
                `;
            });

            document.getElementById('total-amount-view').innerText = total.toFixed(2);
        }

        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function downloadReceiptImage() {
            const receiptArea = document.getElementById('receipt-print-area');
            const orderId = document.getElementById('order-id-input').value || 'receipt';
            
            html2canvas(receiptArea, {
                useCORS: true,
                scale: 3, 
                backgroundColor: '#ffffff',
                borderRadius: '32px'
            }).then(canvas => {
                const image = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `igari-receipt-${orderId}.png`;
                link.href = image;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(error => {
                console.error('Error generating canvas:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกภาพ กรุณาลองใหม่อีกครั้ง');
            });
        }

        function startLoginSparkles() {
            const container = document.getElementById('login-sparkle-container');
            if(!container) return;

            sparkleInterval = setInterval(() => {
                if(document.getElementById('login-section').classList.contains('hidden')) return;

                const sparkle = document.createElement('img');
                sparkle.className = 'sparkle-item';
                sparkle.src = 'https://i.postimg.cc/vmft9YC4/star.png';

                const size = Math.floor(Math.random() * 10) + 10; 
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;

                sparkle.style.left = `${Math.random() * 100}%`;
                sparkle.style.top = `${Math.random() * 80 + 10}%`; 

                const duration = Math.random() * 1.5 + 1.5; 
                sparkle.style.animationDuration = `${duration}s`;

                container.appendChild(sparkle);

                setTimeout(() => {
                    sparkle.remove();
                }, duration * 1000);

            }, 200);
        }

        window.addEventListener('DOMContentLoaded', () => {
            startLoginSparkles();
        });
    </script>
</body>
</html>
